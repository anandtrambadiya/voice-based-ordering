<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBill – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#0ea5a0;--teal2:#0891b2;--teal-dark:#087c78;--teal-lt:rgba(14,165,160,.09);--teal-bd:rgba(14,165,160,.25);--green:#16a34a;--green-bg:#dcfce7;--green-bd:#86efac;--amber:#d97706;--amber-bg:#fef3c7;--amber-bd:#fcd34d;--red:#dc2626;--red-bg:#fee2e2;--bg:#f0fafa;--white:#fff;--surf:#f7fefe;--text:#0d2626;--muted:#4d7070;--border:#cde8e8;--border2:#a8d5d3;--grad:linear-gradient(135deg,#0ea5a0,#3b82f6);--grad-dark:linear-gradient(135deg,#0d2626,#0a3535);--sh-sm:0 2px 8px rgba(14,165,160,.08);--fh:'Sora',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.admin-topbar{height:64px;background:var(--grad-dark);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.admin-topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{display:flex;align-items:center;gap:9px;font-family:var(--fh);font-weight:800;font-size:1.15rem;color:#fff;letter-spacing:-.02em;text-decoration:none}
.topbar-logo-icon{width:34px;height:34px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center}
.topbar-logo-icon svg{width:18px;height:18px;fill:white}
.topbar-sep{width:1px;height:22px;background:rgba(255,255,255,.12)}
.topbar-title{font-size:.85rem;color:rgba(255,255,255,.6);font-weight:500}
.admin-badge-top{background:rgba(14,165,160,.3);border:1px solid rgba(14,165,160,.5);color:#5eead4;border-radius:6px;padding:.18rem .65rem;font-size:.7rem;font-weight:700;letter-spacing:.06em;font-family:var(--fm)}
.topbar-right{display:flex;align-items:center;gap:.8rem}
.topbar-notif{position:relative;width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.topbar-notif svg{width:17px;height:17px;stroke:rgba(255,255,255,.7);fill:none;stroke-width:2}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#f59e0b;border-radius:50%;border:2px solid #0a2a35}
.btn-logout{display:flex;align-items:center;gap:6px;padding:.42rem .9rem;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:9px;color:#fca5a5;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--fb)}
.btn-logout svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.stats-bar{background:var(--white);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:10px;padding:.55rem 1.1rem;border-radius:12px;border:1.5px solid var(--border);background:var(--surf)}
.stat-pill-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.stat-pill-val{font-family:var(--fh);font-size:1.15rem;font-weight:800;color:var(--text);line-height:1}
.stat-pill-lbl{font-size:.71rem;color:var(--muted);font-weight:600;margin-top:2px}
.admin-main{flex:1;padding:1.8rem 2rem;max-width:1400px;margin:0 auto;width:100%}
.tabs-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:1rem}
.tabs{display:flex;gap:6px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:4px}
.tab-btn{padding:.5rem 1.15rem;border-radius:9px;border:none;background:transparent;font-family:var(--fh);font-weight:600;font-size:.82rem;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn.active{background:var(--grad);color:#fff;box-shadow:0 3px 10px rgba(14,165,160,.25)}
.tab-count{background:rgba(14,165,160,.15);color:var(--teal-dark);border-radius:50px;padding:.05rem .45rem;font-size:.68rem;font-weight:800}
.search-filter{display:flex;gap:.6rem;align-items:center}
.search-box{position:relative}
.search-box input{padding:.52rem 1rem .52rem 2.2rem;background:var(--white);border:1.5px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:.83rem;color:var(--text);outline:none;transition:border-color .2s;width:220px}
.search-box input:focus{border-color:var(--teal)}
.search-box svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;pointer-events:none}
.filter-select{padding:.52rem .9rem;background:var(--white);border:1.5px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:.83rem;color:var(--text);outline:none;cursor:pointer}
.table-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--sh-sm)}
.reg-table{width:100%;border-collapse:collapse}
.reg-table thead tr{background:var(--surf)}
.reg-table th{padding:.8rem 1.1rem;text-align:left;font-family:var(--fh);font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);white-space:nowrap}
.reg-table td{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);font-size:.875rem;vertical-align:middle}
.reg-table tbody tr:last-child td{border-bottom:none}
.reg-table tbody tr:hover td{background:#fafefe}
.rest-cell strong{font-weight:700;color:var(--text);display:block}
.rest-cell .ref{font-family:var(--fm);font-size:.72rem;color:var(--muted);margin-top:2px}
.contact-cell .name{font-weight:600;color:var(--text);display:block}
.contact-cell .email{font-size:.78rem;color:var(--muted);display:block;margin-top:1px}
.contact-cell .phone{font-size:.78rem;color:var(--muted);display:block}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:.28rem .82rem;border-radius:50px;font-size:.74rem;font-weight:700;white-space:nowrap}
.status-pending{background:var(--amber-bg);color:#92400e;border:1px solid var(--amber-bd)}
.status-approved{background:var(--green-bg);color:#065f46;border:1px solid var(--green-bd)}
.status-rejected{background:var(--red-bg);color:#7f1d1d;border:1px solid #fca5a5}
.plan-chip{display:inline-flex;align-items:center;padding:.22rem .7rem;border-radius:8px;font-size:.73rem;font-weight:700;background:var(--teal-lt);color:var(--teal-dark);border:1px solid var(--teal-bd)}
.date-cell{font-size:.78rem;color:var(--muted);white-space:nowrap}
.actions-cell{display:flex;gap:.5rem;align-items:center}
.act-btn{padding:.38rem .85rem;border-radius:8px;border:none;cursor:pointer;font-family:var(--fh);font-weight:600;font-size:.76rem;transition:all .2s;white-space:nowrap}
.act-view{background:var(--surf);color:var(--muted);border:1.5px solid var(--border)}
.act-view:hover{border-color:var(--teal);color:var(--teal)}
.act-approve{background:linear-gradient(135deg,#0ea5a0,#059669);color:#fff;box-shadow:0 3px 10px rgba(14,165,160,.28)}
.act-approve:hover{transform:translateY(-1px)}
.act-reject{background:var(--surf);color:#dc2626;border:1.5px solid #fca5a5}
.act-reject:hover{background:var(--red-bg)}
.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--muted)}
.empty-state .es-icon{font-size:2.8rem;margin-bottom:.8rem;opacity:.5}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px)}
.overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--white);border-radius:24px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.2);transform:translateY(28px) scale(.96);transition:transform .32s;max-height:90vh;overflow-y:auto}
.overlay.open .modal-box{transform:translateY(0) scale(1)}
.detail-box{max-width:540px;padding:2rem}
.apm-box{max-width:560px;padding:2rem}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.4rem;gap:1rem}
.detail-header h2{font-size:1.2rem;font-weight:800;color:var(--text)}
.detail-header .dh-sub{font-size:.82rem;color:var(--muted);margin-top:2px}
.modal-close-btn{width:34px;height:34px;flex-shrink:0;border-radius:9px;background:var(--surf);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--muted);transition:all .2s}
.detail-section{margin-bottom:1.3rem}
.detail-section-title{font-size:.72rem;font-weight:700;color:var(--teal-dark);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.7rem;display:flex;align-items:center;gap:8px}
.detail-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.detail-row{display:flex;flex-direction:column;gap:2px}
.detail-row .dk{font-size:.72rem;color:var(--muted);font-weight:600}
.detail-row .dv{font-size:.87rem;color:var(--text);font-weight:500}
.detail-row.full{grid-column:1/-1}
.cred-box{background:linear-gradient(135deg,#e0f7f7,#dff0ff);border:1px solid var(--border);border-radius:16px;padding:1.3rem;margin:1.1rem 0}
.cred-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.cred-row:last-child{margin-bottom:0}
.cred-label{font-size:.74rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cred-value{font-family:var(--fm);font-weight:700;font-size:.95rem;color:var(--teal-dark)}
.copy-btn{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:.2rem .6rem;font-size:.7rem;cursor:pointer;color:var(--muted);font-family:var(--fb);transition:all .2s}
.copy-btn:hover{border-color:var(--teal);color:var(--teal)}
.email-preview{background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:1.1rem;font-size:.83rem;line-height:1.75;max-height:200px;overflow-y:auto}
.ep-subject{font-weight:700;color:var(--text);margin-bottom:.5rem;font-family:var(--fh);font-size:.88rem}
.ep-body{color:var(--muted);white-space:pre-line}
.spinner{width:17px;height:17px;border:2px solid rgba(14,165,160,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:9999;background:var(--text);color:#fff;padding:.9rem 1.4rem;border-radius:14px;font-size:.87rem;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.25);transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:linear-gradient(135deg,#065f46,#0ea5a0)}
.toast.error{background:linear-gradient(135deg,#7f1d1d,#dc2626)}
@media(max-width:900px){.admin-main{padding:1.2rem}.stats-bar{padding:.8rem 1.2rem;gap:1rem}.reg-table th:nth-child(4),.reg-table td:nth-child(4){display:none}}
@media(max-width:640px){.reg-table th:nth-child(3),.reg-table td:nth-child(3),.reg-table th:nth-child(6),.reg-table td:nth-child(6){display:none}.admin-topbar{padding:0 1rem}.topbar-title{display:none}}
</style>
</head>
<body>

<div class="admin-topbar">
  <div class="admin-topbar-left">
    <a href="/" class="topbar-logo">
      <div class="topbar-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm0 0"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 19v3M8 22h8" stroke="white" stroke-width="2" fill="none"/></svg>
      </div>
      VoiceBill
    </a>
    <div class="topbar-sep"></div>
    <span class="topbar-title">Admin Dashboard</span>
    <span class="admin-badge-top">ADMIN</span>
  </div>
  <div class="topbar-right">
    <div class="topbar-notif" title="Pending registrations">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-dot" id="notif-dot" style="display:none"></span>
    </div>
    <button class="btn-logout" onclick="doLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-pill"><div class="stat-pill-icon" style="background:#fef3c7">📋</div><div><div class="stat-pill-val" id="stat-total">0</div><div class="stat-pill-lbl">Total</div></div></div>
  <div class="stat-pill"><div class="stat-pill-icon" style="background:var(--amber-bg)">⏳</div><div><div class="stat-pill-val" id="stat-pending">0</div><div class="stat-pill-lbl">Pending</div></div></div>
  <div class="stat-pill"><div class="stat-pill-icon" style="background:var(--green-bg)">✅</div><div><div class="stat-pill-val" id="stat-approved">0</div><div class="stat-pill-lbl">Approved</div></div></div>
  <div class="stat-pill"><div class="stat-pill-icon" style="background:var(--red-bg)">❌</div><div><div class="stat-pill-val" id="stat-rejected">0</div><div class="stat-pill-lbl">Rejected</div></div></div>
</div>

<div class="admin-main">
  <div class="tabs-row">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all',this)">📋 All <span class="tab-count" id="tc-all">0</span></button>
      <button class="tab-btn" onclick="switchTab('pending',this)">⏳ Pending <span class="tab-count" id="tc-pending">0</span></button>
      <button class="tab-btn" onclick="switchTab('approved',this)">✅ Approved <span class="tab-count" id="tc-approved">0</span></button>
      <button class="tab-btn" onclick="switchTab('rejected',this)">❌ Rejected <span class="tab-count" id="tc-rejected">0</span></button>
    </div>
    <div class="search-filter">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search business…" oninput="renderTable()">
      </div>
      <select class="filter-select" id="plan-filter" onchange="renderTable()">
        <option value="">All Plans</option>
        <option>Pay As You Go</option>
        <option>One Time Integration</option>
        <option>Create New Website</option>
      </select>
    </div>
  </div>
  <div class="table-wrap">
    <table class="reg-table">
      <thead><tr>
        <th>Business</th><th>Owner / Contact</th><th>Location</th>
        <th>Plan</th><th>Submitted</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody id="reg-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      <div class="es-icon">📭</div><p>No registrations found.</p>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box detail-box">
    <div class="detail-header">
      <div><h2 id="detail-title">Details</h2><div class="dh-sub" id="detail-sub">—</div></div>
      <button class="modal-close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- Approval Result Modal -->
<div class="overlay" id="apmOverlay" onclick="if(event.target===this)closeApm()">
  <div class="modal-box apm-box">
    <div class="detail-header">
      <h2 id="apm-title">Approved</h2>
      <button class="modal-close-btn" onclick="closeApm()">✕</button>
    </div>
    <div id="apm-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _regsCache = [];
let currentTab = 'all';

async function loadRegs() {
  const res = await fetch('/api/admin/registrations');
  if (res.ok) _regsCache = await res.json();
  return _regsCache;
}

function updateStats() {
  const r = _regsCache;
  const p = r.filter(x=>x.status==='pending').length;
  const a = r.filter(x=>x.status==='approved').length;
  const rj= r.filter(x=>x.status==='rejected').length;
  document.getElementById('stat-total').textContent    = r.length;
  document.getElementById('stat-pending').textContent  = p;
  document.getElementById('stat-approved').textContent = a;
  document.getElementById('stat-rejected').textContent = rj;
  document.getElementById('tc-all').textContent        = r.length;
  document.getElementById('tc-pending').textContent    = p;
  document.getElementById('tc-approved').textContent   = a;
  document.getElementById('tc-rejected').textContent   = rj;
  document.getElementById('notif-dot').style.display   = p > 0 ? 'block' : 'none';
}

function renderTable() {
  updateStats();
  let regs = [..._regsCache];
  const q    = (document.getElementById('search-input')?.value||'').toLowerCase();
  const plan = document.getElementById('plan-filter')?.value||'';

  if (currentTab !== 'all') regs = regs.filter(r => r.status === currentTab);
  if (q) regs = regs.filter(r =>
    (r.business_name||'').toLowerCase().includes(q) ||
    (r.owner_name||'').toLowerCase().includes(q) ||
    (r.email||'').toLowerCase().includes(q) ||
    (r.city||'').toLowerCase().includes(q) ||
    (r.ref_id||'').toLowerCase().includes(q)
  );
  if (plan) regs = regs.filter(r => r.plan === plan);

  const tbody = document.getElementById('reg-tbody');
  const empty = document.getElementById('empty-state');
  if (!regs.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  const statusMap = {
    pending:  `<span class="status-badge status-pending">⏳ Pending</span>`,
    approved: `<span class="status-badge status-approved">✅ Approved</span>`,
    rejected: `<span class="status-badge status-rejected">❌ Rejected</span>`,
  };

  tbody.innerHTML = regs.map(r => `
    <tr>
      <td><div class="rest-cell"><strong>${esc(r.business_name)}</strong><div class="ref">${r.ref_id}</div></div></td>
      <td><div class="contact-cell"><span class="name">${esc(r.owner_name||r.business_name)}</span><span class="email">${esc(r.email)}</span><span class="phone">${esc(r.phone||'')}</span></div></td>
      <td>${esc(r.city||'—')}</td>
      <td><span class="plan-chip">${esc(r.plan||'—')}</span></td>
      <td class="date-cell">${r.submitted_at||'—'}</td>
      <td>${statusMap[r.status]||statusMap.pending}</td>
      <td><div class="actions-cell">
        <button class="act-btn act-view" onclick="viewDetail(${r.id})">View</button>
        ${r.status==='pending' ? `<button class="act-btn act-approve" onclick="approveReg(${r.id})">✅ Approve</button>` : ''}
        ${r.status==='pending' ? `<button class="act-btn act-reject"  onclick="rejectReg(${r.id})">Reject</button>` : ''}
      </div></td>
    </tr>`).join('');
}

async function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  await loadRegs();
  renderTable();
}

async function approveReg(id) {
  const res  = await fetch(`/api/admin/registrations/${id}/approve`, {method:'POST'});
  const data = await res.json();
  if (!res.ok) { showToast('Error approving', 'error'); return; }
  await loadRegs(); renderTable(); closeDetail();
  showToast('✅ Approved!', 'success');

  if (data.new_website) {
    document.getElementById('apm-title').textContent = '🎉 Account Created — New Website';
    document.getElementById('apm-body').innerHTML =
      `<p style="font-size:.87rem;color:var(--muted);margin-bottom:.9rem">Account created for <b>${data.email}</b>. Send these credentials to the client:</p>
      <div class="cred-box">
        <div class="cred-row"><span class="cred-label">Email</span><span class="cred-value">${data.email}</span></div>
        <div class="cred-row"><span class="cred-label">Password</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="cred-value" id="apm-pwd">${data.password||''}</span>
            <button class="copy-btn" onclick="copyText('${data.password||''}')">Copy</button>
          </div></div>
        <div class="cred-row"><span class="cred-label">Login URL</span><span class="cred-value" style="font-size:.78rem">${data.login_url||''}</span></div>
      </div>
      <p style="font-size:.8rem;font-weight:700;color:var(--text);margin:.9rem 0 .4rem">📧 Email to send:</p>
      <div class="email-preview"><div class="ep-subject">${esc(data.email_subject||'')}</div>
      <div class="ep-body">${esc(data.email_body||'')}</div></div>
      ${data.email_sent ? '<p style="font-size:.75rem;color:#065f46;font-weight:700;margin-top:.7rem">✅ Email sent automatically to ' + data.email + '</p>' : '<p style="font-size:.75rem;color:#dc2626;margin-top:.7rem">⚠️ Auto-send failed (' + (data.email_error||'check app password') + '). Copy and send manually.</p>'}`;
  } else {
    document.getElementById('apm-title').textContent = `✅ Approved — ${data.plan||''}`;
    document.getElementById('apm-body').innerHTML =
      `<p style="font-size:.87rem;color:var(--muted);margin-bottom:.9rem">Send this email to <b>${data.email}</b>:</p>
      <div class="email-preview"><div class="ep-subject">${esc(data.email_subject||'')}</div>
      <div class="ep-body">${esc(data.email_body||'')}</div></div>
      ${data.email_sent ? '<p style="font-size:.75rem;color:#065f46;font-weight:700;margin-top:.7rem">✅ Email sent automatically to ' + data.email + '</p>' : '<p style="font-size:.75rem;color:#dc2626;margin-top:.7rem">⚠️ Auto-send failed (' + (data.email_error||'check app password') + '). Copy and send manually.</p>'}`;
  }
  document.getElementById('apmOverlay').classList.add('open');
}

async function rejectReg(id) {
  if (!confirm('Reject this registration?')) return;
  const res = await fetch(`/api/admin/registrations/${id}/reject`, {method:'POST'});
  if (res.ok) {
    showToast('Registration rejected', 'error');
    await loadRegs(); renderTable(); closeDetail();
  }
}

function viewDetail(id) {
  const reg = _regsCache.find(r => r.id === id);
  if (!reg) return;
  document.getElementById('detail-title').textContent = '🏪 ' + reg.business_name;
  document.getElementById('detail-sub').textContent   = reg.ref_id + ' · Submitted ' + (reg.submitted_at||'—');
  const sm = {pending:'⏳ Pending', approved:'✅ Approved', rejected:'❌ Rejected'};
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Business Info</div>
      <div class="detail-grid">
        <div class="detail-row"><span class="dk">Business Name</span><span class="dv">${esc(reg.business_name)}</span></div>
        <div class="detail-row"><span class="dk">Type</span><span class="dv">${esc(reg.business_type||'—')}</span></div>
        <div class="detail-row"><span class="dk">City</span><span class="dv">${esc(reg.city||'—')}</span></div>
        <div class="detail-row"><span class="dk">Plan</span><span class="dv">${esc(reg.plan||'—')}</span></div>
        <div class="detail-row"><span class="dk">Status</span><span class="dv">${sm[reg.status]||reg.status}</span></div>
        <div class="detail-row"><span class="dk">Submitted</span><span class="dv">${reg.submitted_at||'—'}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Owner & Contact</div>
      <div class="detail-grid">
        <div class="detail-row"><span class="dk">Owner Name</span><span class="dv">${esc(reg.owner_name||reg.business_name)}</span></div>
        <div class="detail-row"><span class="dk">Phone</span><span class="dv">${esc(reg.phone||'—')}</span></div>
        <div class="detail-row full"><span class="dk">Email</span><span class="dv">${esc(reg.email)}</span></div>
      </div>
    </div>
    <div style="display:flex;gap:.7rem;margin-top:1.2rem">
      ${reg.status==='pending' ? `<button class="act-btn act-approve" style="flex:1;padding:.7rem" onclick="closeDetail();approveReg(${reg.id})">✅ Approve</button>` : ''}
      ${reg.status==='pending' ? `<button class="act-btn act-reject" style="padding:.7rem .9rem" onclick="closeDetail();rejectReg(${reg.id})">Reject</button>` : ''}
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }
function closeApm()    { document.getElementById('apmOverlay').classList.remove('open'); }

async function doLogout() {
  await fetch('/api/admin/logout', {method:'POST'});
  window.location.href = '/admin';
}

function copyText(text) {
  try {
    if (navigator.clipboard) navigator.clipboard.writeText(text);
    else { const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el); }
    showToast('Copied!', 'success', 1500);
  } catch(e) {}
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='success', dur=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), dur);
}

window.addEventListener('DOMContentLoaded', async () => {
  await loadRegs();
  updateStats();
  renderTable();
});
</script>
</body>
</html>
