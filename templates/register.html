<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — VoiceBill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --teal:#0ea5a0; --teal2:#0891b2; --teal-lt:rgba(14,165,160,.09); --teal-bd:rgba(14,165,160,.28); --bdr:#dde5ea; --txt:#0c1f1f; --txt2:#3d6060; --txt3:#7a9f9f; --txt4:#b0cccc; --s1:#f8fafc; --red:#dc2626; --red-bg:#fee2e2; --green:#16a34a; --green-bg:#dcfce7; --green-bd:#86efac; --fh:'Sora',sans-serif; --fb:'DM Sans',sans-serif; }
    body { min-height: 100vh; background: #f2f6f8; font-family: var(--fb); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1.5px solid var(--bdr); border-radius: 24px; padding: 2.5rem 2.2rem; width: 100%; max-width: 460px; box-shadow: 0 8px 40px rgba(0,0,0,.07); }
    .logo { display: flex; align-items: center; gap: 8px; font-family: var(--fh); font-size: 1.3rem; font-weight: 900; color: var(--teal); margin-bottom: .3rem; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 8px rgba(14,165,160,.5); }
    .subtitle { color: var(--txt3); font-size: .83rem; margin-bottom: 1.8rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: .95rem; }
    label { display: block; font-size: .76rem; font-weight: 700; color: var(--txt2); margin-bottom: 5px; }
    input, select { width: 100%; background: var(--s1); border: 1.5px solid var(--bdr); color: var(--txt); border-radius: 10px; padding: .62rem .9rem; font-family: var(--fb); font-size: .83rem; outline: none; transition: border-color .2s, box-shadow .2s; }
    input:focus, select:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-lt); }
    input::placeholder { color: var(--txt4); }
    select option { background: #fff; }
    .btn { width: 100%; padding: .8rem; background: linear-gradient(135deg,var(--teal),var(--teal2)); color: #fff; border: none; border-radius: 11px; font-family: var(--fh); font-size: .9rem; font-weight: 800; cursor: pointer; transition: all .2s; box-shadow: 0 4px 14px rgba(14,165,160,.28); margin-top: .2rem; }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .msg { display: none; border-radius: 9px; padding: .55rem .9rem; font-size: .78rem; font-weight: 600; margin-bottom: 1rem; }
    .msg.error   { background: var(--red-bg);   border: 1.5px solid #fca5a5; color: var(--red); }
    .msg.success { background: var(--green-bg); border: 1.5px solid var(--green-bd); color: var(--green); }
    .foot { text-align: center; margin-top: 1.3rem; font-size: .78rem; color: var(--txt3); }
    .foot a { color: var(--teal); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="logo-dot"></span>VoiceBill</div>
  <div class="subtitle">Create your business account</div>
  <div class="msg" id="msg"></div>
  <div class="row">
    <div class="field"><label>Business name</label><input id="name" placeholder="Hotel Royal" /></div>
    <div class="field"><label>Business type</label>
      <select id="biz-type">
        <option value="restaurant">Restaurant</option><option value="cafe">Cafe</option>
        <option value="grocery">Grocery</option><option value="medical">Medical</option>
        <option value="mart">Mart / Kirana</option>
      </select>
    </div>
  </div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="owner@business.com" /></div>
  <div class="field"><label>Password</label><input type="password" id="password" placeholder="Choose a password" /></div>
  <div class="row">
    <div class="field"><label>Phone</label><input id="phone" placeholder="+91 98765 43210" /></div>
    <div class="field"><label>City</label><input id="address" placeholder="Rajkot, Gujarat" /></div>
  </div>
  <button class="btn" id="btn" onclick="register()">Create Account</button>
  <div class="foot">Already registered? <a href="/login">Sign in</a></div>
</div>
<script>
async function register() {
  const btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='Creating…';
  const body={name:document.getElementById('name').value.trim(),email:document.getElementById('email').value.trim().toLowerCase(),password:document.getElementById('password').value.trim(),business_type:document.getElementById('biz-type').value,phone:document.getElementById('phone').value.trim(),address:document.getElementById('address').value.trim()};
  if (!body.name||!body.email||!body.password) { showMsg('Name, email and password required','error'); btn.disabled=false; btn.textContent='Create Account'; return; }
  const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if (!res.ok) { showMsg(data.error||'Failed','error'); btn.disabled=false; btn.textContent='Create Account'; return; }
  showMsg('Account created! Redirecting…','success');
  setTimeout(()=>window.location.href='/login', 1500);
}
function showMsg(t,type) { const e=document.getElementById('msg'); e.textContent=t; e.className='msg '+type; e.style.display='block'; }
</script>
</body>
</html>
