{% extends "base.html" %}
{% block title %}Orders — Spice Garden{% endblock %}

{% block head %}
<style>
  .page-header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .page-header h1 { font-family: var(--font-head); font-size: 32px; font-weight: 700; }
  .page-header p { color: var(--muted); margin-top: 6px; }

  .filters { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .filters input { width: 200px; }

  .orders-list { display: flex; flex-direction: column; gap: 12px; }
  .order-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color 0.2s;
  }
  .order-card:hover { border-color: #333; }
  .order-card-header {
    display: flex; align-items: center; gap: 16px; padding: 16px 20px;
    cursor: pointer; user-select: none;
  }
  .order-id { font-family: var(--font-head); font-size: 18px; color: var(--accent); min-width: 80px; }
  .order-meta { flex: 1; }
  .order-meta-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .order-meta-item { font-size: 13px; color: var(--muted); }
  .order-meta-item strong { color: var(--text); font-weight: 500; }
  .order-total { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
  .order-actions { display: flex; gap: 8px; }

  .chevron { color: var(--muted); transition: transform 0.2s; font-size: 12px; }
  .order-card.open .chevron { transform: rotate(180deg); }

  .order-items-list {
    display: none; padding: 0 20px 16px;
    border-top: 1px solid var(--border);
  }
  .order-card.open .order-items-list { display: block; }
  .order-item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px;
  }
  .order-item-row:last-of-type { border-bottom: none; }
  .order-item-row .name { flex: 1; }
  .order-item-row .qty  { color: var(--muted); min-width: 40px; text-align: center; }
  .order-item-row .amt  { font-weight: 600; min-width: 80px; text-align: right; }

  .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <div class="flex items-center justify-between">
      <div>
        <h1>Orders</h1>
        <p>View all placed orders and download invoices</p>
      </div>
      <a href="/order/new" class="btn btn-primary">+ New Order</a>
    </div>
  </div>

  <div class="filters">
    <input id="search" type="text" placeholder="Search by order # or table…" oninput="filterOrders()" />
    <select id="status-filter" onchange="filterOrders()" style="width:auto">
      <option value="">All statuses</option>
      <option value="placed">Placed</option>
      <option value="pending">Pending</option>
    </select>
    <span class="text-muted text-sm" id="order-count"></span>
  </div>

  <div class="orders-list" id="orders-list">
    <div class="empty-state"><div class="icon">📋</div><p>Loading orders…</p></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allOrders = [];

async function loadOrders() {
  const res = await fetch('/api/orders');
  allOrders = await res.json();
  filterOrders();
}

function filterOrders() {
  const q      = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('status-filter').value;

  let filtered = allOrders;
  if (q)      filtered = filtered.filter(o => String(o.id).includes(q) || o.table_no.includes(q));
  if (status) filtered = filtered.filter(o => o.status === status);

  document.getElementById('order-count').textContent = filtered.length + ' order' + (filtered.length !== 1 ? 's' : '');
  renderOrders(filtered);
}

function renderOrders(orders) {
  const list = document.getElementById('orders-list');
  if (!orders.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No orders found</p></div>`;
    return;
  }
  list.innerHTML = orders.map(o => `
    <div class="order-card" id="oc-${o.id}">
      <div class="order-card-header" onclick="toggleOrder(${o.id})">
        <div class="order-id">#${String(o.id).padStart(4,'0')}</div>
        <div class="order-meta">
          <div class="order-meta-row">
            <div class="order-meta-item">Table <strong>${o.table_no}</strong></div>
            <div class="order-meta-item"><strong>${o.items.length}</strong> item${o.items.length!==1?'s':''}</div>
            <div class="order-meta-item">${o.created_at}</div>
            <div class="order-meta-item"><span class="badge ${o.status==='placed'?'badge-green':'badge-orange'}">${o.status}</span></div>
          </div>
        </div>
        <div class="order-total">₹${o.total.toFixed(2)}</div>
        <div class="order-actions" onclick="event.stopPropagation()">
          <a href="/api/orders/${o.id}/invoice" target="_blank" class="btn btn-ghost btn-sm">📄 Invoice</a>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="order-items-list">
        ${o.items.map(i => `
          <div class="order-item-row">
            <span class="name">${i.name}</span>
            <span class="qty">×${i.quantity}</span>
            <span class="amt">₹${i.subtotal.toFixed(2)}</span>
          </div>
        `).join('')}
        <div class="order-item-row" style="margin-top:4px;opacity:0.6">
          <span class="name text-muted">GST (5%)</span><span class="qty"></span>
          <span class="amt">₹${o.tax.toFixed(2)}</span>
        </div>
        <div class="order-item-row" style="font-weight:700;font-size:15px">
          <span class="name">Total</span><span class="qty"></span>
          <span class="amt text-accent">₹${o.total.toFixed(2)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleOrder(id) {
  document.getElementById(`oc-${id}`).classList.toggle('open');
}

loadOrders();
</script>
{% endblock %}
