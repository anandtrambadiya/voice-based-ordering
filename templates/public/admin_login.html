<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBill — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#0ea5a0;--teal2:#0891b2;--grad:linear-gradient(135deg,#0ea5a0,#3b82f6);--red:#dc2626;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#0d1f2d 0%,#0a2a35 55%,#061a25 100%);padding:2rem;position:relative;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;}
.b1{width:500px;height:500px;background:rgba(14,165,160,.15);top:-120px;right:-80px;}
.b2{width:350px;height:350px;background:rgba(59,130,246,.12);bottom:-60px;left:-60px;}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);
  border-radius:28px;padding:2.8rem 2.4rem;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.35);position:relative;z-index:2;}
.logo{display:flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:800;font-size:1.4rem;
  color:#fff;margin-bottom:2rem;justify-content:center;letter-spacing:-.02em;}
.logo-icon{width:42px;height:42px;background:var(--grad);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2;}
h1{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;text-align:center;margin-bottom:.3rem;}
.sub{font-size:.9rem;color:rgba(255,255,255,.45);text-align:center;margin-bottom:1.8rem;}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;}
.fg input{width:100%;padding:.85rem 1.1rem;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);
  border-radius:12px;font-size:.95rem;color:#fff;outline:none;transition:border-color .2s;}
.fg input::placeholder{color:rgba(255,255,255,.25);}
.fg input:focus{border-color:rgba(14,165,160,.7);box-shadow:0 0 0 4px rgba(14,165,160,.12);}
.err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.35);color:#fca5a5;border-radius:10px;
  padding:.6rem 1rem;font-size:.83rem;margin-bottom:.9rem;display:none;}
.btn{width:100%;padding:.95rem;background:var(--grad);color:#fff;border:none;border-radius:12px;
  font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 6px 22px rgba(14,165,160,.35);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.back{display:flex;align-items:center;justify-content:center;gap:6px;color:rgba(255,255,255,.35);
  font-size:.82rem;text-decoration:none;margin-top:1.4rem;transition:color .2s;}
.back:hover{color:rgba(255,255,255,.7);}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 19v3M8 22h8"/></svg>
    </div>
    VoiceBill
  </div>
  <h1>Admin Panel</h1>
  <p class="sub">Sign in to manage business registrations</p>

  <div class="err" id="err">Invalid credentials. Please try again.</div>

  <div class="fg">
    <label>Username</label>
    <input type="text" id="u" placeholder="Admin username" autocomplete="username">
  </div>
  <div class="fg">
    <label>Password</label>
    <input type="password" id="p" placeholder="Admin password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
  </div>

  <button class="btn" id="btn" onclick="login()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    Login
  </button>

  <a href="/" class="back">← Back to VoiceBill</a>
</div>
<script>
async function login() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  if (!u || !p) { err.style.display='block'; err.textContent='Please enter both fields.'; return; }
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Verifying…';
  const res = await fetch('/api/admin/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username: u, password: p })
  });
  if (res.ok) {
    window.location.href = '/admin';
  } else {
    err.style.display = 'block';
    err.textContent = 'Invalid credentials. Please try again.';
    btn.disabled = false;
    btn.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Login';
  }
}
</script>
</body>
</html>
