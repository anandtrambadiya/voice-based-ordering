<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — VoiceBill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --teal:#0ea5a0; --teal2:#0891b2; --teal-lt:rgba(14,165,160,.09); --teal-bd:rgba(14,165,160,.28); --bdr:#dde5ea; --txt:#0c1f1f; --txt2:#3d6060; --txt3:#7a9f9f; --txt4:#b0cccc; --s1:#f8fafc; --red:#dc2626; --red-bg:#fee2e2; --fh:'Sora',sans-serif; --fb:'DM Sans',sans-serif; }
    body { min-height: 100vh; background: #f2f6f8; font-family: var(--fb); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1.5px solid var(--bdr); border-radius: 24px; padding: 2.5rem 2.2rem; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,.07); }
    .logo { display: flex; align-items: center; gap: 8px; font-family: var(--fh); font-size: 1.3rem; font-weight: 900; color: var(--teal); margin-bottom: .3rem; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 8px rgba(14,165,160,.5); }
    .subtitle { color: var(--txt3); font-size: .83rem; margin-bottom: 2rem; }
    label { display: block; font-size: .76rem; font-weight: 700; color: var(--txt2); margin-bottom: 5px; }
    input { width: 100%; background: var(--s1); border: 1.5px solid var(--bdr); color: var(--txt); border-radius: 10px; padding: .65rem .95rem; font-family: var(--fb); font-size: .84rem; outline: none; transition: border-color .2s, box-shadow .2s; margin-bottom: 1rem; }
    input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-lt); }
    input::placeholder { color: var(--txt4); }
    .btn { width: 100%; padding: .8rem; background: linear-gradient(135deg,var(--teal),var(--teal2)); color: #fff; border: none; border-radius: 11px; font-family: var(--fh); font-size: .9rem; font-weight: 800; cursor: pointer; transition: all .2s; box-shadow: 0 4px 14px rgba(14,165,160,.28); margin-top: .3rem; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(14,165,160,.38); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .err { display: none; background: var(--red-bg); border: 1.5px solid #fca5a5; color: var(--red); border-radius: 9px; padding: .55rem .9rem; font-size: .78rem; font-weight: 600; margin-bottom: 1rem; }
    .foot { text-align: center; margin-top: 1.3rem; font-size: .78rem; color: var(--txt3); }
    .foot a { color: var(--teal); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="logo-dot"></span>VoiceBill</div>
  <div class="subtitle">Sign in to your business dashboard</div>
  <div class="err" id="err"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@business.com" />
  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
  <button class="btn" id="btn" onclick="login()">Sign in</button>
  <div class="foot">New here? <a href="/register">Create account</a></div>
</div>
<script>
async function login() {
  const email=document.getElementById('email').value.trim(), pwd=document.getElementById('password').value.trim();
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  if (!email||!pwd) { showErr('Enter email and password'); return; }
  btn.disabled=true; btn.textContent='Signing in…';
  const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})});
  const data=await res.json();
  if (!res.ok) { showErr(data.error||'Login failed'); btn.disabled=false; btn.textContent='Sign in'; return; }
  window.location.href=data.redirect||'/';
}
function showErr(msg) { const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }
</script>
</body>
</html>
